<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Registro de Conductor - CargoFlow</title>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .icon-fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<!-- Tailwind Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-container": "#1e5eff",
                        "outline": "#737688",
                        "on-background": "#1c1b1b",
                        "surface-container-lowest": "#ffffff",
                        "on-error": "#ffffff",
                        "on-secondary": "#ffffff",
                        "surface": "#fcf9f8",
                        "on-primary-fixed": "#001550",
                        "error-container": "#ffdad6",
                        "tertiary": "#7e4900",
                        "secondary-fixed-dim": "#3ce36a",
                        "surface-container-highest": "#e5e2e1",
                        "background": "#fcf9f8",
                        "secondary-container": "#5cfd80",
                        "on-primary-container": "#f0f0ff",
                        "on-secondary-container": "#00732c",
                        "on-tertiary-fixed-variant": "#693c00",
                        "on-tertiary-fixed": "#2c1600",
                        "primary-fixed": "#dce1ff",
                        "outline-variant": "#c3c5d9",
                        "error": "#ba1a1a",
                        "on-primary-fixed-variant": "#003ab2",
                        "inverse-on-surface": "#f3f0ef",
                        "secondary-fixed": "#69ff87",
                        "surface-container-high": "#eae7e7",
                        "on-surface": "#1c1b1b",
                        "on-secondary-fixed": "#002108",
                        "on-error-container": "#93000a",
                        "surface-variant": "#e5e2e1",
                        "on-tertiary": "#ffffff",
                        "tertiary-container": "#a05e00",
                        "surface-container": "#f0eded",
                        "secondary": "#006e2a",
                        "tertiary-fixed-dim": "#ffb870",
                        "inverse-primary": "#b6c4ff",
                        "surface-tint": "#004ee8",
                        "surface-dim": "#dcd9d9",
                        "primary-fixed-dim": "#b6c4ff",
                        "surface-container-low": "#f6f3f2",
                        "on-tertiary-container": "#ffeee2",
                        "on-primary": "#ffffff",
                        "on-surface-variant": "#434656",
                        "primary": "#0047d3",
                        "on-secondary-fixed-variant": "#00531e",
                        "surface-bright": "#fcf9f8",
                        "inverse-surface": "#313030",
                        "tertiary-fixed": "#ffdcbe"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "base": "4px",
                        "lg": "24px",
                        "container-margin": "16px",
                        "sm": "8px",
                        "xs": "4px",
                        "xl": "32px",
                        "md": "16px",
                        "gutter": "12px"
                    },
                    "fontFamily": {
                        "label-caps": ["Inter"],
                        "headline-lg": ["Inter"],
                        "data-price": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-sm": ["Inter"],
                        "body-md": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-md": ["Inter"]
                    },
                    "fontSize": {
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "headline-lg": ["28px", { "lineHeight": "34px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "data-price": ["20px", { "lineHeight": "24px", "letterSpacing": "0.01em", "fontWeight": "600" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-sm": ["18px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],
                        "headline-md": ["22px", { "lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col font-body-md selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Transactional Header -->
<header class="bg-surface-container-lowest sticky top-0 z-40 px-container-margin h-16 flex items-center justify-between border-b border-surface-variant">
<button class="p-2 -ml-2 text-on-surface-variant hover:bg-surface-container rounded-full transition-colors flex items-center justify-center" type="button">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-sm text-headline-sm text-primary">CargoFlow</h1>
<div class="w-10"></div> <!-- Spacer for balance -->
</header>
<!-- Progress Stepper -->
<div class="bg-surface-container-lowest px-container-margin py-md shadow-[0px_4px_20px_rgba(0,0,0,0.03)] relative z-30">
<div class="flex items-center justify-between mb-2">
<span class="font-label-caps text-label-caps text-primary uppercase">Paso 1 de 3</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">Info Personal y Vehículo</span>
</div>
<div class="flex gap-2 w-full h-1.5">
<div class="flex-1 bg-primary-container rounded-full"></div>
<div class="flex-1 bg-surface-variant rounded-full"></div>
<div class="flex-1 bg-surface-variant rounded-full"></div>
</div>
</div>
<!-- Main Content Area -->
<main class="flex-1 overflow-y-auto px-container-margin py-lg pb-32 max-w-2xl mx-auto w-full">
<h2 class="font-headline-md text-headline-md text-on-surface mb-lg">Completa tu perfil</h2>
<form class="flex flex-col gap-xl">
<!-- Personal Info Section -->
<section class="flex flex-col gap-md">
<h3 class="font-headline-sm text-headline-sm text-on-surface">Información Personal</h3>
<div class="relative group">
<input class="peer w-full bg-surface-container-lowest border-[1.5px] border-outline-variant rounded-xl px-4 pt-5 pb-2 font-body-lg text-body-lg text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all" id="fullName" placeholder=" " required="" type="text"/>
<label class="absolute text-on-surface-variant font-body-md text-body-md duration-300 transform -translate-y-3 scale-75 top-4 z-10 origin-[0] left-4 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-3 peer-focus:text-primary-container pointer-events-none" for="fullName">Nombre Completo</label>
</div>
<div class="relative group">
<input class="peer w-full bg-surface-container-lowest border-[1.5px] border-outline-variant rounded-xl px-4 pt-5 pb-2 font-body-lg text-body-lg text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all" id="idNumber" placeholder=" " required="" type="text"/>
<label class="absolute text-on-surface-variant font-body-md text-body-md duration-300 transform -translate-y-3 scale-75 top-4 z-10 origin-[0] left-4 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-3 peer-focus:text-primary-container pointer-events-none" for="idNumber">Número de Cédula</label>
</div>
</section>
<hr class="border-surface-variant"/>
<!-- Vehicle Info Section -->
<section class="flex flex-col gap-md">
<h3 class="font-headline-sm text-headline-sm text-on-surface">Información del Vehículo</h3>
<div class="relative group">
<input class="peer w-full bg-surface-container-lowest border-[1.5px] border-outline-variant rounded-xl px-4 pt-5 pb-2 font-headline-sm text-headline-sm text-on-surface uppercase focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all" id="plateNumber" placeholder=" " required="" type="text"/>
<label class="absolute text-on-surface-variant font-body-md text-body-md duration-300 transform -translate-y-3 scale-75 top-4 z-10 origin-[0] left-4 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-3 peer-focus:text-primary-container pointer-events-none" for="plateNumber">Placa del Vehículo</label>
</div>
<div class="flex flex-col gap-sm mt-sm">
<span class="font-label-sm text-label-sm text-on-surface-variant">Tipo de Vehículo</span>
<div class="grid grid-cols-2 gap-sm">
<!-- Selectable Card 1 (Active Example) -->
<label class="cursor-pointer">
<input checked="" class="peer sr-only" name="vehicleType" type="radio" value="furgon"/>
<div class="bg-surface-container-lowest border-[1.5px] border-primary-container rounded-xl p-md flex flex-col items-center justify-center gap-2 peer-checked:bg-primary-fixed peer-checked:border-primary-container transition-all hover:bg-surface-container-low h-full">
<span class="material-symbols-outlined text-primary-container">local_shipping</span>
<span class="font-label-sm text-label-sm text-on-surface text-center">Furgón</span>
</div>
</label>
<!-- Selectable Card 2 -->
<label class="cursor-pointer">
<input class="peer sr-only" name="vehicleType" type="radio" value="sencillo"/>
<div class="bg-surface-container-lowest border-[1.5px] border-outline-variant rounded-xl p-md flex flex-col items-center justify-center gap-2 peer-checked:bg-primary-fixed peer-checked:border-primary-container transition-all hover:bg-surface-container-low h-full">
<span class="material-symbols-outlined text-on-surface-variant">airport_shuttle</span>
<span class="font-label-sm text-label-sm text-on-surface text-center">Camión Sencillo</span>
</div>
</label>
</div>
</div>
</section>
<hr class="border-surface-variant"/>
<!-- Documents Section -->
<section class="flex flex-col gap-md">
<div class="flex flex-col">
<h3 class="font-headline-sm text-headline-sm text-on-surface">Documentación</h3>
<p class="font-body-md text-body-md text-on-surface-variant">Sube fotos claras de tus documentos vigentes.</p>
</div>
<div class="grid grid-cols-2 gap-md">
<!-- Upload Card: Cédula -->
<button class="bg-surface-container-lowest border-[1.5px] border-dashed border-outline-variant rounded-xl p-md flex flex-col items-center justify-center gap-sm hover:bg-surface-container-low hover:border-primary transition-all group min-h-[120px]" type="button">
<div class="bg-surface-container-high rounded-full p-2 group-hover:bg-primary-fixed group-hover:text-primary-container transition-colors">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary-container">cloud_upload</span>
</div>
<span class="font-label-sm text-label-sm text-on-surface text-center">Cédula<br/>Frontal/Reverso</span>
</button>
<!-- Upload Card: Licencia -->
<button class="bg-surface-container-lowest border-[1.5px] border-dashed border-outline-variant rounded-xl p-md flex flex-col items-center justify-center gap-sm hover:bg-surface-container-low hover:border-primary transition-all group min-h-[120px]" type="button">
<div class="bg-surface-container-high rounded-full p-2 group-hover:bg-primary-fixed group-hover:text-primary-container transition-colors">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary-container">cloud_upload</span>
</div>
<span class="font-label-sm text-label-sm text-on-surface text-center">Licencia de<br/>Conducción</span>
</button>
<!-- Upload Card: SOAT -->
<button class="bg-surface-container-lowest border-[1.5px] border-dashed border-outline-variant rounded-xl p-md flex flex-col items-center justify-center gap-sm hover:bg-surface-container-low hover:border-primary transition-all group min-h-[120px]" type="button">
<div class="bg-surface-container-high rounded-full p-2 group-hover:bg-primary-fixed group-hover:text-primary-container transition-colors">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary-container">cloud_upload</span>
</div>
<span class="font-label-sm text-label-sm text-on-surface text-center">SOAT<br/>Vigente</span>
</button>
<!-- Upload Card: Tarjeta Propiedad -->
<button class="bg-surface-container-lowest border-[1.5px] border-dashed border-outline-variant rounded-xl p-md flex flex-col items-center justify-center gap-sm hover:bg-surface-container-low hover:border-primary transition-all group min-h-[120px]" type="button">
<div class="bg-surface-container-high rounded-full p-2 group-hover:bg-primary-fixed group-hover:text-primary-container transition-colors">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary-container">cloud_upload</span>
</div>
<span class="font-label-sm text-label-sm text-on-surface text-center">Tarjeta de<br/>Propiedad</span>
</button>
</div>
</section>
</form>
</main>
<!-- Fixed Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full bg-surface-container-lowest border-t border-surface-variant p-container-margin pb-safe z-40 max-w-2xl mx-auto right-0">
<button class="w-full bg-primary-container text-on-primary-container font-headline-sm text-headline-sm rounded-xl h-[56px] flex items-center justify-center gap-2 hover:opacity-90 active:scale-[0.98] transition-all shadow-[0px_4px_14px_rgba(30,94,255,0.2)]" type="button">
            Continuar
            <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
<!-- Script to handle dynamic safe area padding for modern mobile browsers -->
<script>
        // Simple script to ensure visual interaction feels responsive
        document.querySelectorAll('input, button').forEach(el => {
            el.addEventListener('touchstart', function() {}, {passive: true});
        });
    </script>
</body></html>
