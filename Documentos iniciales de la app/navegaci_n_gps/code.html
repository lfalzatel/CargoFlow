<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
<title>Navegación GPS - Transporte Carga</title>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Google Fonts: Inter -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind Config -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-container": "#1e5eff",
                        "outline": "#737688",
                        "on-background": "#1c1b1b",
                        "surface-container-lowest": "#ffffff",
                        "on-error": "#ffffff",
                        "on-secondary": "#ffffff",
                        "surface": "#fcf9f8",
                        "on-primary-fixed": "#001550",
                        "error-container": "#ffdad6",
                        "tertiary": "#7e4900",
                        "secondary-fixed-dim": "#3ce36a",
                        "surface-container-highest": "#e5e2e1",
                        "background": "#fcf9f8",
                        "secondary-container": "#5cfd80",
                        "on-primary-container": "#f0f0ff",
                        "on-secondary-container": "#00732c",
                        "on-tertiary-fixed-variant": "#693c00",
                        "on-tertiary-fixed": "#2c1600",
                        "primary-fixed": "#dce1ff",
                        "outline-variant": "#c3c5d9",
                        "error": "#ba1a1a",
                        "on-primary-fixed-variant": "#003ab2",
                        "inverse-on-surface": "#f3f0ef",
                        "secondary-fixed": "#69ff87",
                        "surface-container-high": "#eae7e7",
                        "on-surface": "#1c1b1b",
                        "on-secondary-fixed": "#002108",
                        "on-error-container": "#93000a",
                        "surface-variant": "#e5e2e1",
                        "on-tertiary": "#ffffff",
                        "tertiary-container": "#a05e00",
                        "surface-container": "#f0eded",
                        "secondary": "#006e2a",
                        "tertiary-fixed-dim": "#ffb870",
                        "inverse-primary": "#b6c4ff",
                        "surface-tint": "#004ee8",
                        "surface-dim": "#dcd9d9",
                        "primary-fixed-dim": "#b6c4ff",
                        "surface-container-low": "#f6f3f2",
                        "on-tertiary-container": "#ffeee2",
                        "on-primary": "#ffffff",
                        "on-surface-variant": "#434656",
                        "primary": "#0047d3",
                        "on-secondary-fixed-variant": "#00531e",
                        "surface-bright": "#fcf9f8",
                        "inverse-surface": "#313030",
                        "tertiary-fixed": "#ffdcbe"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "base": "4px",
                        "lg": "24px",
                        "container-margin": "16px",
                        "sm": "8px",
                        "xs": "4px",
                        "xl": "32px",
                        "md": "16px",
                        "gutter": "12px"
                    },
                    "fontFamily": {
                        "label-caps": ["Inter"],
                        "headline-lg": ["Inter"],
                        "data-price": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-sm": ["Inter"],
                        "body-md": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-md": ["Inter"]
                    },
                    "fontSize": {
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "headline-lg": ["28px", { "lineHeight": "34px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "data-price": ["20px", { "lineHeight": "24px", "letterSpacing": "0.01em", "fontWeight": "600" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-sm": ["18px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],
                        "headline-md": ["22px", { "lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1;
        }
        /* Hide scrollbar for clean map view */
        ::-webkit-scrollbar {
            display: none;
        }
        body {
            -ms-overflow-style: none;
            scrollbar-width: none;
            background-color: #e5e2e1; /* Map base color fallback */
        }
    </style>
</head>
<body class="relative w-full h-screen overflow-hidden font-body-md text-on-surface antialiased flex flex-col">
<!-- Map Background -->
<div class="absolute inset-0 z-0 bg-surface-variant overflow-hidden" data-alt="A clean, modern GPS navigation map view of a city street grid. The map uses a light-mode color palette with soft whites, grays, and subtle greens. A prominent, vibrant blue route line snakes through the streets, indicating the navigation path. The lighting is flat and clear, typical of high-quality digital mapping interfaces, ensuring maximum readability without clutter. Professional and efficient aesthetic." data-location="Bogota, Colombia route map with blue path" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCWyAdRp8qB4J5jXtSWh0tAyotfdIow4p2bEn2KloXzI3m4UqsQ7ZsyruznoIvr1hMXA9E7Q7nQUODYrNOflT_W9U2nDl5_ZRESMW0_C8TKCSAzF9RXWuyvvER0Ab-XVChojeLxztIRM4Kv96IkOtL1W59gUeYhrZJ9agXP0_wZJzRg2eU-9PmF6EosyTBoDnjaZR8u7WcLKC4MjuFoEji1QDuts2Lhvh4ib6uG9RxP6sJNBOwczzz_')">
<!-- Simulated Map Elements (Overlay) -->
<div class="absolute inset-0 bg-gradient-to-b from-surface/20 to-surface-variant/40 mix-blend-multiply pointer-events-none"></div>
<!-- Fake Route Line (CSS SVG simulation) -->
<svg class="absolute inset-0 w-full h-full pointer-events-none" preserveaspectratio="none" viewbox="0 0 100 100">
<path class="drop-shadow-sm" d="M 20 100 Q 30 80, 40 70 T 50 40 T 70 20" fill="none" stroke="#0047d3" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
</svg>
<!-- Current Location Marker (Truck) -->
<div class="absolute top-[40%] left-[50%] -translate-x-1/2 -translate-y-1/2 z-10">
<div class="relative w-12 h-12 flex items-center justify-center">
<!-- Pulse Effect -->
<div class="absolute inset-0 bg-primary rounded-full opacity-20 animate-ping"></div>
<div class="absolute w-8 h-8 bg-surface rounded-full shadow-md flex items-center justify-center z-10 border-2 border-primary">
<span class="material-symbols-outlined text-primary text-[20px]" style="font-variation-settings: 'FILL' 1;">local_shipping</span>
</div>
</div>
<!-- Vision Cone -->
<svg class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-24 h-24 pointer-events-none z-0 opacity-30" style="transform: translate(-50%, -50%) rotate(-45deg);">
<path d="M48,48 L10,10 A60,60 0 0,1 86,10 Z" fill="url(#grad1)"></path>
<defs>
<radialgradient cx="50%" cy="50%" fx="50%" fy="50%" id="grad1" r="50%">
<stop offset="0%" style="stop-color:#0047d3;stop-opacity:1"></stop>
<stop offset="100%" style="stop-color:#0047d3;stop-opacity:0"></stop>
</radialgradient>
</defs>
</svg>
</div>
</div>
<!-- Top Navigation Banner (Next Turn) -->
<div class="relative z-50 w-full px-container-margin pt-safe-top mt-4 transition-transform duration-300 transform translate-y-0">
<div class="bg-secondary text-on-secondary rounded-xl shadow-lg flex items-center p-4 gap-4 w-full max-w-md mx-auto">
<!-- Turn Icon -->
<div class="flex-shrink-0 bg-surface-container-lowest/20 rounded-lg w-12 h-12 flex items-center justify-center">
<span class="material-symbols-outlined text-[32px] font-bold">turn_right</span>
</div>
<!-- Instruction Text -->
<div class="flex-1 min-w-0">
<div class="font-headline-lg text-headline-lg flex items-baseline gap-2">
                    200 <span class="font-headline-sm text-headline-sm opacity-90">m</span>
</div>
<div class="font-body-lg text-body-lg truncate opacity-90">
                    Gira a la derecha en Av. El Dorado
                </div>
</div>
<!-- Close/Exit Nav -->
<button aria-label="Exit Navigation" class="flex-shrink-0 w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-lowest/20 transition-colors">
<span class="material-symbols-outlined text-[24px]">close</span>
</button>
</div>
</div>
<!-- Map Controls (Floating Right) -->
<div class="absolute right-container-margin top-1/3 flex flex-col gap-3 z-40">
<button aria-label="Compass" class="w-10 h-10 bg-surface text-on-surface rounded-full shadow-md flex items-center justify-center hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-[20px]">explore</span>
</button>
<button aria-label="Recenter" class="w-10 h-10 bg-surface text-on-surface rounded-full shadow-md flex items-center justify-center hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-[20px]">my_location</span>
</button>
<div class="flex flex-col bg-surface rounded-lg shadow-md mt-2">
<button aria-label="Zoom In" class="w-10 h-10 text-on-surface flex items-center justify-center hover:bg-surface-container-low transition-colors border-b border-surface-variant">
<span class="material-symbols-outlined text-[20px]">add</span>
</button>
<button aria-label="Zoom Out" class="w-10 h-10 text-on-surface flex items-center justify-center hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-[20px]">remove</span>
</button>
</div>
</div>
<!-- Spacer to push bottom card down -->
<div class="flex-grow pointer-events-none"></div>
<!-- Bottom Customer Info & ETA Card -->
<div class="relative z-50 w-full px-container-margin pb-safe-bottom mb-4 pointer-events-auto">
<div class="bg-surface rounded-[16px] shadow-[0px_8px_30px_rgba(0,0,0,0.08)] p-md flex flex-col gap-4 w-full max-w-md mx-auto">
<!-- ETA and Customer Header -->
<div class="flex justify-between items-start">
<div class="flex flex-col">
<div class="font-data-price text-data-price text-primary flex items-baseline gap-1">
                        12 <span class="font-body-md text-body-md text-primary">min</span>
</div>
<div class="font-label-sm text-label-sm text-on-surface-variant">
                        Llegada aprox. 14:30 • 4.2 km
                    </div>
</div>
<!-- Speed Limit/Warning indicator -->
<div class="w-10 h-10 rounded-full border-2 border-error flex items-center justify-center bg-surface">
<span class="font-headline-sm text-headline-sm text-on-surface font-bold">60</span>
</div>
</div>
<!-- Divider -->
<div class="h-px w-full bg-surface-variant"></div>
<!-- Customer Details -->
<div class="flex items-center gap-3">
<div class="w-12 h-12 rounded-full bg-surface-container-high overflow-hidden flex-shrink-0">
<img alt="Juan Pérez" class="w-full h-full object-cover" data-alt="A professional headshot of a Hispanic man in his 40s, smiling subtly. He is wearing a clean, dark blue uniform shirt typical of warehouse managers. The background is a slightly blurred, brightly lit modern logistics center with light-mode appropriate bright whites and soft grays. The lighting is even and professional." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAO08wm9AiqOcV4MXud7_hE-9FRmfGO5k70T1Xao3GMp1GcwD0uObWair52OxT9bTO0rkjo2vjJg5syTm_GBcGbOXLswiaXsQRlAedVkugafEOC_EG04-xmzwzjYGYKcRilAsC8UPI_OZPUL5VeP0hlocfEyPelmXxB705wncMKYSCj1jgBZDiaFvuec8LOTvLLNeN8FqadcZtuN-x1HpX_pSLpj_chEwHoIA2v9M0rwj6mzmmkpw7N"/>
</div>
<div class="flex-1 min-w-0">
<div class="font-label-caps text-label-caps text-on-surface-variant mb-1">RECEPTOR</div>
<div class="font-headline-sm text-headline-sm text-on-surface truncate">Juan Pérez</div>
<div class="font-body-md text-body-md text-outline truncate flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]">location_on</span>
                        Bodega Principal Norte
                    </div>
</div>
<button aria-label="Call Customer" class="w-12 h-12 rounded-full bg-primary-fixed text-primary flex items-center justify-center hover:bg-primary-fixed-dim transition-colors flex-shrink-0">
<span class="material-symbols-outlined text-[24px]">call</span>
</button>
</div>
<!-- Action Button -->
<button class="w-full h-[56px] bg-primary text-on-primary font-headline-sm text-headline-sm rounded-xl flex items-center justify-center gap-2 hover:opacity-90 active:scale-[0.98] transition-all shadow-sm">
                Llegué al Punto
                <span class="material-symbols-outlined">check_circle</span>
</button>
</div>
</div>
</body></html>
