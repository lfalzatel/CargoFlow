<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md antialiased">
<!-- TopAppBar -->

<!-- Main Content Canvas -->

<!-- Camera Viewfinder -->

</div>
<!-- Frame corners for visual effect -->
<div class="absolute top-4 left-4 w-6 h-6 border-t-2 border-l-2 border-on-surface-variant rounded-tl-lg opacity-50"></div>
<div class="absolute top-4 right-4 w-6 h-6 border-t-2 border-r-2 border-on-surface-variant rounded-tr-lg opacity-50"></div>

<!-- Signature Area -->
<canvas class="w-full h-full rounded-xl cursor-crosshair touch-none" id="signature-pad"></canvas>
<!-- Placeholder text -->

        </button>

<!-- Simple Signature Logic Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('signature-pad');
            const ctx = canvas.getContext('2d');
            const placeholder = document.getElementById('signature-placeholder');
            
            // Setup canvas resolution
            function resizeCanvas() {
                const rect = canvas.parentElement.getBoundingClientRect();
                canvas.width = rect.width;
                canvas.height = rect.height;
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.strokeStyle = '#1c1b1b'; // text-on-background
            }
            
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            let isDrawing = false;
            let lastX = 0;
            let lastY = 0;

            function startDrawing(e) {
                isDrawing = true;
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                [lastX, lastY] = [clientX - rect.left, clientY - rect.top];
                placeholder.style.display = 'none'; // Hide placeholder
            }

            function draw(e) {
                if (!isDrawing) return;
                e.preventDefault(); // Prevent scrolling on touch
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const currentX = clientX - rect.left;
                const currentY = clientY - rect.top;

                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(currentX, currentY);
                ctx.stroke();

                [lastX, lastY] = [currentX, currentY];
            }

            function stopDrawing() {
                isDrawing = false;
            }

            // Mouse Events
            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDrawing);
            canvas.addEventListener('mouseout', stopDrawing);

            // Touch Events
            canvas.addEventListener('touchstart', startDrawing, {passive: false});
            canvas.addEventListener('touchmove', draw, {passive: false});
            canvas.addEventListener('touchend', stopDrawing);

            // Clear Button Logic
            const clearBtn = document.querySelector('button.text-primary');
            if(clearBtn) {
                clearBtn.addEventListener('click', () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    placeholder.style.display = 'flex';
                });
            }
        });
    </script>
