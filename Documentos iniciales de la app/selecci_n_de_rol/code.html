<!DOCTYPE html>

<html lang="es"><head>

                    "on-tertiary-container": "#ffeee2",

            "borderRadius": {

            },
            "fontFamily": {

<style>
        /* Custom styles for interactions */
        .role-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .role-card.selected {
            border-color: #1e5eff; /* primary-container */
            background-color: #f0f0ff; /* on-primary-container as a light tint */
            box-shadow: 0px 8px 30px rgba(30, 94, 255, 0.15);
            transform: translateY(-2px);
        }
        .role-card.selected .icon-wrapper {
            color: #1e5eff;
            transform: scale(1.1);
        }
        .icon-wrapper {
            transition: all 0.3s ease;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-lowest text-on-background min-h-screen flex flex-col font-body-md antialiased">
<!-- Top Brand Area (No Navigation Shell for Linear Flow) -->
<header class="w-full flex justify-center items-center py-lg px-container-margin">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary text-[28px]" style="font-variation-settings: 'FILL' 1;">local_shipping</span>
<span class="font-headline-md text-headline-md font-bold text-primary tracking-tight">CargoFlow</span>
</div>
</header>
<!-- Main Content Container -->
<main class="flex-1 flex flex-col items-center justify-center px-container-margin pb-xl w-full max-w-3xl mx-auto">
<div class="text-center mb-xl w-full">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-sm">¿Cómo usarás CargoFlow?</h1>
<p class="font-body-md text-body-md text-outline">Selecciona tu perfil para personalizar tu experiencia.</p>
</div>
<!-- Role Selection Grid -->
<div class="flex flex-col sm:flex-row gap-lg w-full">
<!-- Card 1: Client -->
<button class="role-card flex-1 bg-surface-container-lowest border-2 border-outline-variant rounded-2xl p-xl flex flex-col items-center justify-center cursor-pointer hover:shadow-lg shadow-[0px_4px_20px_rgba(0,0,0,0.05)] group relative overflow-hidden focus:outline-none focus:ring-2 focus:ring-primary-container focus:ring-offset-2" type="button">
<div class="icon-wrapper text-outline group-hover:text-primary-container mb-lg">
<span class="material-symbols-outlined text-[64px] font-light">package_2</span>
</div>
<h2 class="font-headline-sm text-headline-sm text-on-surface">Soy cliente</h2>
<p class="font-body-md text-body-md text-outline mt-sm text-center">Quiero enviar carga y rastrear mis despachos.</p>
<!-- Selection Indicator -->
<div class="absolute top-md right-md opacity-0 transition-opacity duration-300 indicator">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
<!-- Card 2: Driver -->
<button class="role-card flex-1 bg-surface-container-lowest border-2 border-outline-variant rounded-2xl p-xl flex flex-col items-center justify-center cursor-pointer hover:shadow-lg shadow-[0px_4px_20px_rgba(0,0,0,0.05)] group relative overflow-hidden focus:outline-none focus:ring-2 focus:ring-primary-container focus:ring-offset-2" type="button">
<div class="icon-wrapper text-outline group-hover:text-primary-container mb-lg">
<span class="material-symbols-outlined text-[64px] font-light">directions_car</span>
</div>
<h2 class="font-headline-sm text-headline-sm text-on-surface">Soy conductor</h2>
<p class="font-body-md text-body-md text-outline mt-sm text-center">Quiero encontrar cargas y gestionar mis viajes.</p>
<!-- Selection Indicator -->
<div class="absolute top-md right-md opacity-0 transition-opacity duration-300 indicator">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
</div>
</main>
<!-- Fixed Bottom Action Area -->
<div class="w-full bg-surface-container-lowest p-container-margin pb-[env(safe-area-inset-bottom,24px)] flex justify-center shadow-[0px_-4px_20px_rgba(0,0,0,0.05)] sticky bottom-0 z-10">
<button class="w-full max-w-md h-[56px] rounded-xl font-label-caps text-label-caps uppercase flex items-center justify-center transition-all duration-300 bg-surface-variant text-outline cursor-not-allowed disabled:opacity-50" disabled="" id="continueBtn">
            Continuar
        </button>
</div>
<!-- Interaction Logic -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const cards = document.querySelectorAll('.role-card');
            const continueBtn = document.getElementById('continueBtn');
            let selectedRole = null;

            cards.forEach((card, index) => {
                card.addEventListener('click', () => {
                    // Remove selected state from all cards
                    cards.forEach(c => {
                        c.classList.remove('selected');
                        c.querySelector('.indicator').classList.remove('opacity-100');
                        c.querySelector('.indicator').classList.add('opacity-0');
                    });

                    // Add selected state to clicked card
                    card.classList.add('selected');
                    card.querySelector('.indicator').classList.remove('opacity-0');
                    card.querySelector('.indicator').classList.add('opacity-100');

                    // Enable continue button
                    selectedRole = index === 0 ? 'cliente' : 'conductor';
                    
                    continueBtn.disabled = false;
                    continueBtn.classList.remove('bg-surface-variant', 'text-outline', 'cursor-not-allowed');
                    continueBtn.classList.add('bg-primary-container', 'text-white', 'hover:bg-primary', 'active:scale-[0.98]', 'shadow-md');
                });
            });
        });
    </script>
</body></html>
