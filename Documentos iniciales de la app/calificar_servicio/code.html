<!DOCTYPE html>

<html lang="es"><head>

<style>
        body { background-color: theme('colors.background'); }
        /* Hide scrollbar for clean mobile feel */
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }
        
        .star-rating .material-symbols-outlined {
            font-size: 40px;
            color: theme('colors.outline-variant');
            cursor: pointer;
            transition: color 0.2s, transform 0.1s;
        }
        .star-rating .material-symbols-outlined.active {
            color: #FFB800; /* Custom gold for stars, overriding theme for distinct semantic meaning, though tertiary-fixed-dim could be used */
            font-variation-settings: 'FILL' 1;
        }
        .star-rating .material-symbols-outlined:active {
            transform: scale(0.9);
        }
        
        /* Floating Label CSS */
        .floating-input-group { position: relative; }
        .floating-input {
            width: 100%;
            border: 1.5px solid theme('colors.outline-variant');
            border-radius: theme('borderRadius.lg');
            padding: 16px 16px 12px 16px;
            font-family: theme('fontFamily.body-md');
            font-size: 14px;
            background: transparent;
            outline: none;
            transition: border-color 0.2s;
            resize: none;
        }
        .floating-input:focus {
            border-color: theme('colors.primary-container');
        }
        .floating-label {
            position: absolute;
            left: 16px;
            top: 14px;
            color: theme('colors.on-surface-variant');
            font-family: theme('fontFamily.body-md');
            font-size: 14px;
            pointer-events: none;
            transition: 0.2s ease all;
            background-color: theme('colors.background');
            padding: 0 4px;
            margin-left: -4px;
        }
        .floating-input:focus ~ .floating-label,
        .floating-input:not(:placeholder-shown) ~ .floating-label {
            top: -8px;
            font-size: 12px;
            color: theme('colors.primary-container');
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-on-background antialiased flex flex-col h-screen max-w-md mx-auto relative bg-background">
<!-- Top App Bar (Suppressed Navigation logic applies, but providing a simple back/close for contextual flow) -->
<header class="flex items-center justify-between px-md py-sm w-full top-0 sticky bg-background z-50">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors duration-200 text-on-surface">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<span class="font-headline-sm text-headline-sm text-on-surface">Entrega Completada</span>
<div class="w-10 h-10"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content Canvas -->
<main class="flex-1 overflow-y-auto px-container-margin pb-[100px] flex flex-col items-center">
<!-- Driver Profile Section -->
<div class="mt-lg flex flex-col items-center">
<div class="relative">
<img class="w-24 h-24 rounded-full object-cover border-4 border-surface-container-lowest shadow-[0px_4px_20px_rgba(0,0,0,0.05)]" data-alt="A professional headshot of a Hispanic male logistics driver in his late 30s, wearing a neat uniform shirt. He has a friendly, reassuring smile. The background is slightly blurred showing the interior of a clean, modern delivery truck cabin during daytime. Soft, natural lighting. High quality corporate photography style." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCgJcj0keKtpwsh-SAE1gREmmJT_PtO9ju7CuEYfoPqt3AfCVtnX968iOXnT1mAwEVwAFQGnx3IqoPFvXaaX_2dFeT89H7tZU2LlH52_pTcYEp6fvtC_WXlrM2_L6pn0CEqLBrRmMfB0_CGh8DvR5GTEqewBYcIjbbC69BZdbI-aXTO9Iq7DBbvQArfaWrBnGkgTmR-BaQIpAqrOORD82VkCnc5UVXk_CRPKMQOpozAYsNDdFoDesm7"/>
<div class="absolute bottom-0 right-0 bg-secondary-container text-on-secondary-container w-8 h-8 rounded-full flex items-center justify-center border-2 border-background">
<span class="material-symbols-outlined text-[16px]" data-icon="verified" data-weight="fill" style="font-variation-settings: 'FILL' 1;">verified</span>
</div>
</div>
<h1 class="font-headline-md text-headline-md mt-md text-on-surface">Carlos Rodriguez</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs">Vehículo Furgón • Placa JKL-456</p>
</div>
<!-- Rating Section -->
<div class="mt-xl w-full bg-surface-container-lowest rounded-2xl p-md shadow-[0px_4px_20px_rgba(0,0,0,0.05)] flex flex-col items-center">
<h2 class="font-headline-sm text-headline-sm text-on-surface mb-md">¿Cómo fue tu experiencia?</h2>
<div class="flex gap-sm star-rating justify-center mb-md" id="starContainer">
<span class="material-symbols-outlined active" data-value="1">star</span>
<span class="material-symbols-outlined active" data-value="2">star</span>
<span class="material-symbols-outlined active" data-value="3">star</span>
<span class="material-symbols-outlined active" data-value="4">star</span>
<span class="material-symbols-outlined active" data-value="5">star</span>
</div>
<!-- Optional Comments -->
<div class="w-full mt-sm floating-input-group">
<textarea class="floating-input h-24" id="commentInput" placeholder=" "></textarea>
<label class="floating-label" for="commentInput">Comentarios (Opcional)</label>
</div>
</div>
<!-- Tip Section -->
<div class="mt-lg w-full">
<h3 class="font-label-caps text-label-caps text-on-surface-variant mb-sm uppercase">Agregar Propina</h3>
<div class="grid grid-cols-4 gap-xs">
<button class="tip-btn border-[1.5px] border-outline-variant text-on-surface font-label-sm text-label-sm py-sm rounded-lg flex justify-center items-center transition-colors">
                    $2k
                </button>
<button class="tip-btn border-[1.5px] border-primary-container bg-primary-fixed text-on-primary-fixed-variant font-label-sm text-label-sm py-sm rounded-lg flex justify-center items-center transition-colors">
                    $5k
                </button>
<button class="tip-btn border-[1.5px] border-outline-variant text-on-surface font-label-sm text-label-sm py-sm rounded-lg flex justify-center items-center transition-colors">
                    $10k
                </button>
<button class="tip-btn border-[1.5px] border-outline-variant text-on-surface font-label-sm text-label-sm py-sm rounded-lg flex justify-center items-center transition-colors">
                    Otro
                </button>
</div>
</div>
</main>
<!-- Bottom Action Button Fixed -->
<div class="fixed bottom-0 w-full max-w-md bg-background pb-safe px-container-margin py-md z-50">
<button class="w-full bg-primary-container text-on-primary font-headline-sm text-headline-sm h-[56px] rounded-xl shadow-[0px_8px_30px_rgba(0,0,0,0.08)] transition-transform active:scale-95 flex items-center justify-center">
            Enviar Calificación
        </button>
</div>
<script>
        // Star Rating Logic
        const stars = document.querySelectorAll('.star-rating span');
        stars.forEach(star => {
            star.addEventListener('click', (e) => {
                const value = parseInt(e.target.getAttribute('data-value'));
                stars.forEach((s, index) => {
                    if (index < value) {
                        s.classList.add('active');
                        s.style.fontVariationSettings = "'FILL' 1";
                    } else {
                        s.classList.remove('active');
                        s.style.fontVariationSettings = "'FILL' 0";
                    }
                });
            });
        });

        // Tip Button Logic
        const tipBtns = document.querySelectorAll('.tip-btn');
        tipBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // Reset all
                tipBtns.forEach(b => {
                    b.classList.remove('border-primary-container', 'bg-primary-fixed', 'text-on-primary-fixed-variant');
                    b.classList.add('border-outline-variant', 'text-on-surface');
                });
                // Set active
                btn.classList.remove('border-outline-variant', 'text-on-surface');
                btn.classList.add('border-primary-container', 'bg-primary-fixed', 'text-on-primary-fixed-variant');
            });
        });
    </script>
</body></html>
