<style>
        .input-group {
            position: relative;
            margin-bottom: 24px;
        }
        .input-group input {
            width: 100%;
            height: 56px;
            padding: 24px 16px 8px;
            border: 1.5px solid #c3c5d9;
            border-radius: 12px;
            background: transparent;
            font-size: 16px;
            color: #1c1b1b;
            transition: border-color 0.2s ease;
        }
        .input-group input:focus {
            outline: none;
            border-color: #1e5eff;
        }
        .input-group label {
            position: absolute;
            left: 16px;
            top: 18px;
            color: #737688;
            font-size: 16px;
            transition: 0.2s ease all;
            pointer-events: none;
        }
        .input-group input:focus ~ label,
        .input-group input:not(:placeholder-shown) ~ label {
            top: 8px;
            font-size: 12px;
            color: #1e5eff;
        }
        .input-group input:not(:focus):not(:placeholder-shown) ~ label {
            color: #737688;
        }
        
        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 56px;
            border: 1.5px solid #c3c5d9;
            border-radius: 12px;
            background: transparent;
            transition: background-color 0.2s ease;
            width: 100%;
        }
        .social-btn:hover {
            background-color: #f6f3f2;
        }
    </style>

<body class="h-full bg-background flex flex-col antialiased selection:bg-primary-container selection:text-on-primary-container">
<main class="flex-1 flex flex-col justify-center px-container-margin md:max-w-md md:mx-auto w-full">
<!-- Logo Header -->
<header class="flex flex-col items-center mb-xl w-full">
<div class="w-24 h-24 mb-md rounded-2xl bg-surface-container-lowest shadow-sm flex items-center justify-center p-sm">
<img alt="CargoFlow Logo" class="w-full h-full object-contain rounded-xl mix-blend-multiply filter invert brightness-0 saturate-100 sepia-0 hue-rotate-0 invert" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAYT-K9vwQoeu37Xwl5niMsKVR7lRg09ArEoQCF49Pumskb9LVZE-UpxStUOC-V3jXUca66SBBO3BIZjyPpRLSVZbgcKNoNnWDKov25Gb_TEtwgudE-6NSec95B_NM9oeImrypKmRA2EgRUsP10OD-X_aquPuIFfVTjelL8l3KXyBVBkDX6jIak7WzQ241kfCtQpNrN64MHawa-5DkQdf80dspDUZtV62C_z1__nPuyeH1xxbIKi6CU" style="filter: brightness(0) saturate(100%) invert(23%) sepia(87%) saturate(2283%) hue-rotate(215deg) brightness(97%) contrast(106%);"/>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface text-center">
                Bienvenido de nuevo
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-sm text-center">
                Inicia sesión para gestionar tus envíos.
            </p>
</header>
<!-- Login Form -->
<form class="w-full">
<div class="input-group">
<input autocomplete="email" id="email" placeholder=" " required="" type="email"/>
<label class="font-body-md" for="email">Correo electrónico</label>
</div>
<div class="input-group">
<input autocomplete="current-password" id="password" placeholder=" " required="" type="password"/>
<label class="font-body-md" for="password">Contraseña</label>
<button aria-label="Toggle password visibility" class="absolute right-4 top-4 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined" style="font-size: 20px;">visibility_off</span>
</button>
</div>
<div class="flex justify-end mb-lg">
<a class="font-label-sm text-label-sm text-primary hover:text-on-primary-fixed-variant transition-colors" href="#">
                    ¿Olvidaste tu contraseña?
                </a>
</div>
<button class="w-full h-[56px] bg-[#1E5EFF] text-on-primary font-headline-sm text-headline-sm rounded-xl shadow-md hover:bg-primary transition-all active:scale-[0.98] flex items-center justify-center" type="submit">
                Iniciar sesión
            </button>
</form>
<!-- Divider -->
<div class="relative flex items-center my-xl">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink-0 mx-md font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">
                O continúa con
            </span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Social Login -->
<div class="grid grid-cols-2 gap-md w-full">
<button class="social-btn" type="button">
<svg aria-hidden="true" class="w-6 h-6" viewbox="0 0 24 24">

<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
</button>
<button class="social-btn" type="button">
<svg aria-hidden="true" class="w-6 h-6" viewbox="0 0 24 24">
<path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" fill="#1877F2"></path>
</svg>
</button>
</div>
<!-- Registration Link -->
<div class="mt-xl text-center w-full pb-lg">
<p class="font-body-md text-body-md text-on-surface-variant">
                ¿No tienes cuenta? 
                <a class="font-headline-sm text-body-md text-primary hover:text-on-primary-fixed-variant transition-colors ml-xs" href="#">
                    Regístrate
                </a>
</p>
</div>
</main>
<script>
        // Simple password toggle logic
        document.querySelector('button[aria-label="Toggle password visibility"]').addEventListener('click', function() {
            const input = document.getElementById('password');
            const icon = this.querySelector('span');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility_off';
            }
        });
    </script>
</body></html>
